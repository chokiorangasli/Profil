<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choki Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

<script>
function openPopup() {
  document.getElementById("contactPopup").style.display = "flex";
}

function closePopup() {
  document.getElementById("contactPopup").style.display = "none";
}

/* klik luar popup = tutup */
window.onclick = function(event) {
  let popup = document.getElementById("contactPopup");

  if (event.target == popup) {
    popup.style.display = "none";
  }
}
</script>
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #ffffff, #dbeafe, #111827);
      color: #111827;
    }

    header {
      width: 100%;
      padding: 20px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.2);
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #111827;
      font-weight: 500;
    }

    nav a:hover {
      color: #2563eb;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 120px 10%;
    }

    .hero-text h1 {
      font-size: 50px;
    }

    .hero-text span {
      color: #2563eb;
    }

    .btn {
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      display: inline-block;
      margin-top: 10px;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-area img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid #2563eb;
    }
/* POPUP */
.popup {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);

  justify-content: center;
  align-items: center;
}

/* BOX */
.popup-content {
  background: white;
  padding: 30px;
  width: 320px;
  border-radius: 15px;
  text-align: center;

  animation: popupAnim 0.3s ease;
}

/* ANIMASI */
@keyframes popupAnim {
  from {
    transform: scale(0.7);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }

/* TOMBOL CLOSE */
.close-btn {
  float: right;
  font-size: 28px;
  cursor: pointer;
}

/* LINK */
.contact-links {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
}

.contact-links a {
  text-decoration: none;
  background: #2563eb;
  color: white;
  padding: 12px;
  border-radius: 10px;
  transition: 0.3s;
}

.contact-links a:hover {
  background: #1d4ed8;
  transform: scale(1.05);
}

    }
  </style>

</head>

<body>
