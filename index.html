<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choki Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #ffffff, #dbeafe, #111827);
      color: #111827;
    }

    header {
      width: 100%;
      padding: 20px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.2);
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #111827;
      font-weight: 500;
    }

    nav a:hover {
      color: #2563eb;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 120px 10%;
    }

    .hero-text h1 {
      font-size: 50px;
    }

    .hero-text span {
      color: #2563eb;
    }

    .btn {
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      display: inline-block;
      margin-top: 10px;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-area img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid #2563eb;
    }

    .logo-area span {
      font-size: 22px;
      font-weight: 700;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    .modal-box a {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 55px;
      height: 55px;
      margin: 10px;
      border-radius: 50%;
      background: #f3f4f6;
      font-size: 24px;
      color: #111827;
      text-decoration: none;
    }

    .modal-box a:hover {
      background: #2563eb;
      color: white;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 22px;
    }
  </style>

</head>

<body>

  <header>
    <div class="logo-area">
  <img src="https://i.postimg.cc/BvbXGqg8/download.jpg" alt="Choki">
  <span>CHOKI</span>
</div>

    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#skill">Skill</a>
     <div class="modal" id="contactModal">

  <div class="modal-box">

    <span class="close" onclick="closeMenu()">×</span>

    <a href="https://instagram.com/choki" target="_blank">
      <i class="fa-brands fa-instagram"></i>
    </a>

    <a href="https://wa.me/0123456789" target="_blank">
      <i class="fa-brands fa-whatsapp"></i>
    </a>

    <a href="mailto:choki@email.com">
      <i class="fa-solid fa-envelope"></i>
    </a>

    <a href="https://tiktok.com/@choki" target="_blank">
      <i class="fa-brands fa-tiktok"></i>
    </a>

  </div>

</div>
</nav>
  </header>

<section class="hero" id="home">

  <div class="hero-text">
    <h1>Halo, Saya <span>Choki</span></h1>
    <h2>IT Support</h2>

    <p>
      Membantu menyelesaikan masalah komputer, jaringan,
      remote desktop, troubleshooting, dan kebutuhan teknis lainnya.
    </p>

  </div>

</section>

</body>
</html>
